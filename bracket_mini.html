<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>KO Bracket Mini</title>
  <style>
    :root {
      --red: #c61f26;
      --gold: #c9a227;
      --green: #0f6a4a;
      --panel: rgba(18, 18, 20, 0.84);
      --text: #f5f5f5;
      --text-soft: rgba(245, 245, 245, 0.82);
      --shadow: rgba(0, 0, 0, 0.35);
      --row-bg: rgba(255, 255, 255, 0.04);
      --row-border: rgba(255, 255, 255, 0.08);
      --highlight: rgba(201, 162, 39, 0.16);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    .panel {
      position: absolute;
      right: 0;
      top: 0;
      width: 430px;
      background: var(--panel);
      border: 2px solid var(--gold);
      border-radius: 20px;
      box-shadow: 0 10px 28px var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(6px);
      display: none;
    }

    .top-accent {
      height: 5px;
      background: linear-gradient(90deg, var(--red) 0, var(--gold) 75%, var(--green) 100%);
    }

    .header {
      padding: 14px 18px 12px 18px;
      text-align: center;
    }

    .title {
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .field {
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .sections {
      padding: 4px 14px 12px 14px;
    }

    .section {
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin: 10px 6px 6px 6px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 10px;
      border-radius: 12px;
      margin-bottom: 6px;
      background: var(--row-bg);
      border: 1px solid var(--row-border);
    }

    .row.highlight {
      background: var(--highlight);
      border-color: rgba(201, 162, 39, 0.38);
    }

    .teams {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .team {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.15;
      word-break: break-word;
    }

    .team.winner {
      color: #fff3bf;
    }

    .status {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-soft);
      white-space: nowrap;
      padding-left: 6px;
    }

    .footer {
      padding: 8px 14px 12px 14px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.58);
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="panel" class="panel">
    <div class="top-accent"></div>
    <div class="header">
      <div id="title" class="title">KO Runde</div>
      <div id="subtitle" class="subtitle">Aktuelle Runde</div>
      <div id="field" class="field">Feld</div>
    </div>
    <div id="sections" class="sections"></div>
    <div id="footer" class="footer">Initialisierung…</div>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:5000/bracket_mini";
    const REFRESH_MS = 3000;

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderStatus(match) {
      if (match.display_state === "live") return "Live";
      if (match.display_state === "upcoming") return "Upcoming";
      if (match.display_state === "result") return "Result";
      if (match.display_state === "bye") return "Bye";
      return "";
    }

    function renderTeam(name, isWinner) {
      return `<div class="team ${isWinner ? "winner" : ""}">${escapeHtml(name)}</div>`;
    }

    async function updateBracketMini() {
      const panel = document.getElementById("panel");
      const sectionsEl = document.getElementById("sections");

      try {
        const res = await fetch(API_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();

        if (!data.visible) {
          panel.style.display = "none";
          return;
        }

        panel.style.display = "block";
        document.getElementById("title").textContent = data.title || "KO Runde";
        document.getElementById("subtitle").textContent =
          (data.sections || []).map(s => s.round_label).join(" + ") || "Aktuelle KO-Runde";
        document.getElementById("field").textContent = data.field_label || "";
        document.getElementById("footer").textContent =
          `Aktualisiert: ${new Date().toLocaleTimeString("de-DE")}`;

        sectionsEl.innerHTML = (data.sections || []).map(section => {
          const rows = (section.matches || []).map(match => {
            const teamAWinner = match.winner === 0;
            const teamBWinner = match.winner === 1;
            return `
              <div class="row ${match.highlight ? "highlight" : ""}">
                <div class="teams">
                  ${renderTeam(match.team_a || "—", teamAWinner)}
                  ${renderTeam(match.team_b || "—", teamBWinner)}
                </div>
                <div class="status">${escapeHtml(renderStatus(match))}</div>
              </div>
            `;
          }).join("");

          return `
            <div class="section">
              <div class="section-title">${escapeHtml(section.round_label || "Runde")}</div>
              ${rows}
            </div>
          `;
        }).join("");
      } catch (err) {
        panel.style.display = "block";
        document.getElementById("title").textContent = "KO Runde";
        document.getElementById("subtitle").textContent = "Fehler";
        document.getElementById("field").textContent = "";
        sectionsEl.innerHTML = `
          <div class="section">
            <div class="section-title">Fehler</div>
            <div class="row">
              <div class="teams">
                <div class="team">Bracket konnte nicht geladen werden</div>
              </div>
              <div class="status">-</div>
            </div>
          </div>
        `;
        document.getElementById("footer").textContent = err.message;
      }
    }

    updateBracketMini();
    setInterval(updateBracketMini, REFRESH_MS);
  </script>
</body>
</html>
