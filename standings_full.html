
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Standings Full</title>
  <style>
    :root {
      --red: #c61f26;
      --gold: #c9a227;
      --green: #0f6a4a;
      --panel: rgba(18, 18, 20, 0.86);
      --text: #f5f5f5;
      --text-soft: rgba(245, 245, 245, 0.82);
      --shadow: rgba(0, 0, 0, 0.35);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    .round-strip {
      position: absolute;
      left: -140px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      background: linear-gradient(90deg, var(--red) 0, #a3181e 100%);
      color: #fff;
      padding: 12px 32px;
      min-width: 260px;
      text-align: center;
      border: 4px solid var(--gold);
      border-radius: 18px 18px 0 0;
      box-shadow: 0 8px 20px var(--shadow);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .main-panel {
      position: absolute;
      left: 120px;
      right: 60px;
      top: 0;
      bottom: 40px;
      background: var(--panel);
      border: 2px solid var(--gold);
      border-radius: 0 0 24px 24px;
      box-shadow: 0 12px 30px var(--shadow);
      backdrop-filter: blur(6px);
      overflow: hidden;
    }

    .top-accent {
      height: 6px;
      background: linear-gradient(90deg, var(--red) 0, var(--gold) 75%, var(--green) 100%);
    }

    .header {
      padding: 18px 28px 10px 28px;
      text-align: center;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-soft);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .tournament {
      font-size: 34px;
      font-weight: 700;
      line-height: 1.15;
      color: #fff;
    }

    .table-wrap {
      padding: 14px 24px 20px 24px;
      height: calc(100% - 110px);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 24px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      overflow: hidden;
    }

    .table thead th {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 16px;
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
    }

    .table tbody td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      vertical-align: middle;
    }

    .table tbody tr:nth-child(odd) {
      background: rgba(255, 255, 255, 0.03);
    }

    .table tbody tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.01);
    }

    .table tbody tr.highlight {
      background: rgba(201, 162, 39, 0.14);
    }

    .col-rank { width: 90px; text-align: center; font-weight: 700; }
    .col-name { width: auto; text-align: left; font-weight: 700; }
    .col-points, .col-sets, .col-matches { width: 120px; text-align: center; }

    .status {
      margin-top: auto;
      padding-top: 10px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.58);
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="round-strip" class="round-strip">Vorrunde</div>

  <div class="main-panel">
    <div class="top-accent"></div>
    <div class="header">
      <div class="subtitle">Augsburger Kickerkiste</div>
      <div id="tournament" class="tournament">Lade Turnier…</div>
    </div>

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th class="col-rank">Rang</th>
            <th class="col-name">Spieler</th>
            <th class="col-points">Punkte</th>
            <th class="col-sets">Sätze</th>
            <th class="col-matches">Matches</th>
          </tr>
        </thead>
        <tbody id="standings-body">
          <tr>
            <td colspan="5" style="text-align:center; padding:30px;">Lade Rangliste…</td>
          </tr>
        </tbody>
      </table>
      <div id="status" class="status">Initialisierung…</div>
    </div>
  </div>

  <script>
    const DATA_URL = "http://127.0.0.1:5000/data";
    const REFRESH_MS = 5000;
    const PLACEHOLDER_NAMES = new Set(["Bruce Lee", "Chuck Norris"]);

    function buildMap(items) {
      const map = new Map();
      for (const item of items || []) {
        map.set(item._id, item);
      }
      return map;
    }

    function setText(id, text) {
      document.getElementById(id).textContent = text ?? "—";
    }

    function playerLabel(entry) {
      if (!entry) return "—";
      if (entry.type === "player") {
        return [entry.firstName, entry.lastName].filter(Boolean).join(" ").trim() || entry._id;
      }
      if (entry.type === "player_name") {
        return entry.name || entry._id;
      }
      return entry.name || entry._id || "—";
    }

    function resolveStandingName(standing, entryMap) {
      const entry = entryMap.get(standing.entryId);
      if (!entry) return standing.entryId || "—";

      if (entry.type === "team" && Array.isArray(entry.players)) {
        return entry.players.map(pid => playerLabel(entryMap.get(pid))).join(" / ");
      }

      return playerLabel(entry);
    }

    function getPreliminaryStage(data) {
      const stages = data.stages || [];
      return (
        stages.find(s => (s.name || "").toLowerCase().includes("preliminary")) ||
        stages.find(s => (s.name || "").toLowerCase().includes("vorrunde")) ||
        stages.find(s => (s.tournamentMode || "").toLowerCase() === "monster_dyp") ||
        null
      );
    }

    function getPreliminaryGroup(data, stageId) {
      return (data.groups || []).find(g => g.stageId === stageId) || null;
    }

    function setsDiffText(standing) {
      const value = Number(standing.setsDiff ?? 0);
      return value > 0 ? `+${value}` : `${value}`;
    }

    function getHighlightCutoff(n) {
      if (n <= 16) return 8;
      if (n <= 24) return 12;
      return 16;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderStandings(rows) {
      const tbody = document.getElementById("standings-body");

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:30px;">Keine Vorrunden-Rangliste gefunden</td></tr>`;
        return;
      }

      const numPlayers = rows.filter(r => !PLACEHOLDER_NAMES.has(r.name)).length;
      const highlightCutoff = getHighlightCutoff(numPlayers);

      tbody.innerHTML = rows.map(row => {
        const rank = Number(row.rank ?? 9999);
        const isHighlighted = rank <= highlightCutoff;

        return `
          <tr class="${isHighlighted ? "highlight" : ""}">
            <td class="col-rank">${row.rank ?? "—"}</td>
            <td class="col-name">${escapeHtml(row.name)}</td>
            <td class="col-points">${row.points ?? "—"}</td>
            <td class="col-sets">${escapeHtml(setsDiffText(row))}</td>
            <td class="col-matches">${row.matches ?? "—"}</td>
          </tr>
        `;
      }).join("");
    }

    async function updateStandings() {
      try {
        const res = await fetch(DATA_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        const entryMap = buildMap(data.entries);

        setText("tournament", data.tournaments?.[0]?.name || "Unbekanntes Turnier");

        const stage = getPreliminaryStage(data);
        const group = stage ? getPreliminaryGroup(data, stage._id) : null;

        const standings = (data.standings || [])
          .filter(s => group && s.groupId === group._id)
          .sort((a, b) => Number(a.rank ?? 9999) - Number(b.rank ?? 9999))
          .map(s => ({ ...s, name: resolveStandingName(s, entryMap) }));

        renderStandings(standings);
        setText("status", `Aktualisiert: ${new Date().toLocaleTimeString("de-DE")}`);
      } catch (err) {
        document.getElementById("standings-body").innerHTML =
          `<tr><td colspan="5" style="text-align:center; padding:30px;">Fehler beim Laden der Rangliste</td></tr>`;
        setText("status", `Fehler: ${err.message}`);
      }
    }

    updateStandings();
    setInterval(updateStandings, REFRESH_MS);
  </script>
</body>
</html>
